<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - TrendQA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0f172a; color:#e2e8f0; font-family:sans-serif; }
        .contact-container { max-width:600px; margin:40px auto; padding:0 20px; }
        .contact-container h2 { color:#FFFDFD; }
        .contact-container p { color:#CBD2D0; }
        .form-group { margin-bottom:15px; }
        .form-group label { color:#CBD2D0; display:block; margin-bottom:6px; font-size:0.85rem; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:12px 16px; border:1px solid #334155; border-radius:0; background:#0f172a; color:#e2e8f0; font-size:0.95rem; box-sizing:border-box; }
        .msg-success { background:linear-gradient(135deg,rgba(4,150,255,0.12),rgba(4,150,255,0.03)); border:1px solid rgba(4,150,255,0.3); color:#0496FF; padding:12px 16px; margin-bottom:20px; }
        .msg-warning { background:linear-gradient(135deg,rgba(203,210,208,0.08),rgba(203,210,208,0.02)); border:1px solid rgba(203,210,208,0.2); color:#CBD2D0; padding:12px 16px; margin-bottom:20px; }
        .msg-warning a { color:#0496FF; }
        .btn { display:inline-block; padding:12px 24px; background:#AA0034; color:#fff; border:none; font-size:0.95rem; font-weight:600; cursor:pointer; text-align:center; }
        .btn:hover { background:#88002a; }
    </style>
</head>
<body>
    <div class="contact-container">
        <h2>Descargar informe PDF</h2>
        <p>Completa tus datos para recibir el informe.</p>

        {% if ok and not no_pdf %}
        <div class="msg-success">Gracias por registrarte. Pronto recibiras el enlace de descarga.</div>
        {% elif no_pdf %}
        <div class="msg-warning">No se encontro un informe disponible. Ve al <a href="/dashboard">dashboard</a> y genera un analisis primero.</div>
        {% endif %}

        <form method="POST" action="/contacto">
            <input type="hidden" name="topic" value="{{ topic }}">
            <input type="hidden" name="pais" value="{{ pais }}">

            <div class="form-group">
                <label>Nombre completo *</label>
                <input type="text" name="nombre_completo" required>
            </div>

            <div class="form-group">
                <label>Email corporativo *</label>
                <input type="email" name="email_corporativo" required>
            </div>

            <div class="form-group">
                <label>Telefono</label>
                <input type="tel" name="telefono">
            </div>

            <div class="form-group">
                <label>Industria</label>
                <select name="industria">
                    <option value="">Selecciona...</option>
                    <option value="ecommerce">E-commerce</option>
                    <option value="fintech">Fintech</option>
                    <option value="logistica">Logistica</option>
                    <option value="retail">Retail</option>
                    <option value="tecnologia">Tecnologia</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Mensaje</label>
                <textarea name="mensaje" rows="4"></textarea>
            </div>

            <button type="submit" class="btn">Solicitar informe</button>
        </form>
    </div>
</body>
</html>
